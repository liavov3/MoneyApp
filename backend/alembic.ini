# Alembic configuration for Money App backend v0.0.1.
# The database URL is NOT stored here; it is read from the DATABASE_URL
# environment variable in migrations/env.py (externalized secrets).
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is intentionally left blank; env.py supplies it from settings.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
